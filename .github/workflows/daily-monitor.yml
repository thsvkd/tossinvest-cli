name: Daily Monitor

on:
  schedule:
    # KST 07:00 + 19:00 = UTC 22:00 + 10:00
    - cron: '0 10,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Collect signals
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOW_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOW_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')

          ####################
          # 1. 24h open PR list
          ####################
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          PR_JSON=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,title,author,createdAt,updatedAt,additions,deletions \
            --jq "map(select(.createdAt >= \"$CUTOFF\" or .updatedAt >= \"$CUTOFF\"))")

          ####################
          # 2. 핵심 API (인증 불요)
          ####################
          API_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -A 'Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
            'https://wts-info-api.tossinvest.com/api/v2/stock-infos/A005930' || echo 'ERR')

          ####################
          # 3. 토스 Open API 페이지 모니터
          ####################
          PAGE_HTML=$(curl -sS https://corp.tossinvest.com/ko/open-api || true)
          CHUNK=$(printf '%s' "$PAGE_HTML" | grep -oE 'static/chunks/app[^"]*open-api[^"]*\.js' | head -1 || true)
          if [ -n "$CHUNK" ]; then
            CHUNK_BODY=$(curl -sS "https://corp.tossinvest.com/assets/_next/${CHUNK}" || true)
            CHUNK_SIZE=${#CHUNK_BODY}
            CHUNK_SHA=$(printf '%s' "$CHUNK_BODY" | shasum -a 256 | cut -d' ' -f1)
          else
            CHUNK_BODY=""
            CHUNK_SIZE=0
            CHUNK_SHA=""
          fi

          # 강한 키워드 검출
          FOUND=()
          if [ -n "$CHUNK_BODY" ]; then
            for kw in "토큰 발급" "토큰 발행" "API 키" "client_id" "client_secret" "OAuth" "openapi.tossinvest.com" "developer.tossinvest" "베타" "정식 출시" "sandbox" "API 문서" "redirect_uri" "scope" "refresh_token"; do
              printf '%s' "$CHUNK_BODY" | grep -q "$kw" && FOUND+=("$kw") || true
            done
          fi
          if [ ${#FOUND[@]} -gt 0 ]; then
            KEYWORDS_JSON=$(printf '%s\n' "${FOUND[@]}" | jq -R . | jq -s .)
          else
            KEYWORDS_JSON='[]'
          fi

          # endpoint probe
          PROBES_PAIRS=()
          for path in "/" "/v1/" "/v1/health" "/health" "/.well-known/openid-configuration"; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "https://openapi.tossinvest.com${path}" 2>/dev/null || echo 'ERR')
            PROBES_PAIRS+=("$path=$code")
          done
          PROBES_JSON=$(printf '%s\n' "${PROBES_PAIRS[@]}" | jq -R 'split("=") | {(.[0]): .[1]}' | jq -s 'add // {}')

          # baseline 읽기
          SNAPSHOT=docs/migration/.openapi-snapshot.json
          if [ -f "$SNAPSHOT" ]; then
            BASE_SHA=$(jq -r '.chunk_sha256 // ""' "$SNAPSHOT")
            BASE_KW=$(jq -c '.keywords_found // []' "$SNAPSHOT")
            BASE_PROBES=$(jq -c '.openapi_base_probes // {}' "$SNAPSHOT")
          else
            BASE_SHA=""
            BASE_KW="[]"
            BASE_PROBES="{}"
          fi

          # 비교
          TOSS_STATUS="⚪️ 변화 없음"
          TOSS_CHANGED="false"
          REASONS=()

          if [ -n "$CHUNK_SHA" ] && [ "$CHUNK_SHA" != "$BASE_SHA" ]; then
            REASONS+=("chunk content 변경")
            TOSS_CHANGED="true"
          fi

          NEW_KW=$(jq -n --argjson cur "$KEYWORDS_JSON" --argjson base "$BASE_KW" '$cur - $base')
          if [ "$(echo "$NEW_KW" | jq 'length')" -gt 0 ]; then
            REASONS+=("🚨 새 키워드: $(echo "$NEW_KW" | jq -c .)")
            TOSS_CHANGED="true"
          fi

          PROBE_DIFF=$(jq -n --argjson cur "$PROBES_JSON" --argjson base "$BASE_PROBES" \
            '[($cur | to_entries[]) as $c | ($base[$c.key] // "?") as $b | select($c.value != $b) | "\($c.key) \($b)→\($c.value)"]')
          if [ "$(echo "$PROBE_DIFF" | jq 'length')" -gt 0 ]; then
            REASONS+=("🚨 endpoint 변화: $(echo "$PROBE_DIFF" | jq -r 'join(", ")')")
            TOSS_CHANGED="true"
          fi

          if [ "$TOSS_CHANGED" = "true" ]; then
            if [ ${#REASONS[@]} -gt 0 ]; then
              TOSS_STATUS=$(IFS='; '; echo "${REASONS[*]}")
            fi
            # snapshot 갱신
            jq -n --arg chunk_url "$CHUNK" --arg sha "$CHUNK_SHA" --argjson size "$CHUNK_SIZE" \
              --argjson keywords "$KEYWORDS_JSON" --argjson probes "$PROBES_JSON" \
              --arg ts "$(date -u +%Y-%m-%d)" \
              '{chunk_url: $chunk_url, chunk_sha256: $sha, chunk_size: $size, keywords_found: $keywords, openapi_base_probes: $probes, updated_at: $ts}' \
              > "$SNAPSHOT"
          fi

          ####################
          # 4. 메시지 작성
          ####################
          PR_COUNT=$(echo "$PR_JSON" | jq 'length')
          if [ "$PR_COUNT" = "0" ]; then
            PR_LINES="• 신규 PR 없음"
          else
            PR_LINES=$(echo "$PR_JSON" | jq -r '.[] | "• #\(.number) \(.title) (by @\(.author.login)) — +\(.additions)/-\(.deletions)"')
          fi

          if [ "$API_CODE" = "200" ]; then
            API_LINE="핵심 API: stock-infos/A005930 → 200 OK"
          else
            API_LINE="핵심 API: 🔴 status=$API_CODE (regression 가능성 — GitHub Actions IP 차단 vs 실제 회귀, 사용자 머신에서 \`tossctl monitor api\` 로 확인)"
          fi

          # 일상 케이스 한 줄
          if [ "$PR_COUNT" = "0" ] && [ "$API_CODE" = "200" ] && [ "$TOSS_CHANGED" = "false" ]; then
            MSG="✅ 24h 신규 PR 없음 · 핵심 API OK · 토스 Open API ⚪️ ($NOW_KST KST)"
          else
            MSG="📊 tossctl daily ($NOW_KST KST)

PR 24h:
$PR_LINES

$API_LINE

토스 Open API (issue #31):
• $TOSS_STATUS

인증 필요 endpoint 5개는 본인 머신 \`tossctl monitor api\` 로 확인."
          fi

          # 출력
          {
            echo "msg<<EOF_MSG"
            echo "$MSG"
            echo "EOF_MSG"
            echo "toss_changed=$TOSS_CHANGED"
          } >> "$GITHUB_OUTPUT"

      - name: Send Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MSG: ${{ steps.collect.outputs.msg }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::error::DISCORD_WEBHOOK secret 미설정"
            exit 1
          fi
          # 2000자 한계 (한국어는 multibyte라 안전 마진)
          if [ ${#MSG} -gt 1900 ]; then
            MSG="${MSG:0:1900}…"
          fi
          PAYLOAD=$(printf '%s' "$MSG" | jq -Rs '{content: .}')
          HTTP=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK")
          echo "Discord status: $HTTP"
          cat /tmp/resp || true
          if [ "$HTTP" != "204" ]; then
            echo "::error::Discord 발송 실패 (HTTP $HTTP)"
            exit 1
          fi

      - name: Commit snapshot if changed
        if: steps.collect.outputs.toss_changed == 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/migration/.openapi-snapshot.json
          if git diff --cached --quiet; then
            echo "snapshot 변경 없음 (이미 최신)"
          else
            git commit -m "docs(migration): openapi-snapshot 자동 갱신"
            git push origin HEAD:main
          fi
