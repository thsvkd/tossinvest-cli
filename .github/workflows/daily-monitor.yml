name: Daily Monitor

on:
  schedule:
    - cron: '0 10,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: PR list (24h)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,title,author,createdAt,updatedAt,additions,deletions \
            --jq "map(select(.createdAt >= \"$CUTOFF\" or .updatedAt >= \"$CUTOFF\"))" \
            > /tmp/prs.json
          cat /tmp/prs.json

      - name: 핵심 API probe
        id: api
        run: |
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -A 'Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
            'https://wts-info-api.tossinvest.com/api/v2/stock-infos/A005930' || echo ERR)
          echo "$CODE" > /tmp/api_status
          echo "code=$CODE"

      - name: 토스 Open API 페이지 모니터
        id: toss
        run: |
          HTML=$(curl -sS https://corp.tossinvest.com/ko/open-api || true)
          CHUNK=$(printf '%s' "$HTML" | grep -oE 'static/chunks/app[^"]*open-api[^"]*\.js' | head -1 || true)
          if [ -n "$CHUNK" ]; then
            BODY=$(curl -sS "https://corp.tossinvest.com/assets/_next/${CHUNK}" || true)
            SIZE=${#BODY}
            SHA=$(printf '%s' "$BODY" | shasum -a 256 | cut -d' ' -f1)
          else
            BODY=""
            SIZE=0
            SHA=""
          fi

          FOUND=()
          for kw in "토큰 발급" "토큰 발행" "API 키" "client_id" "client_secret" "OAuth" "openapi.tossinvest.com" "developer.tossinvest" "베타" "정식 출시" "sandbox" "API 문서" "redirect_uri" "scope" "refresh_token"; do
            printf '%s' "$BODY" | grep -q "$kw" 2>/dev/null && FOUND+=("$kw") || true
          done
          KW_JSON='[]'
          if [ ${#FOUND[@]} -gt 0 ]; then
            KW_JSON=$(printf '%s\n' "${FOUND[@]}" | jq -R . | jq -s .)
          fi

          PAIRS=()
          for path in / /v1/ /v1/health /health /.well-known/openid-configuration; do
            c=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "https://openapi.tossinvest.com${path}" 2>/dev/null || echo ERR)
            PAIRS+=("$path=$c")
          done
          PR_JSON=$(printf '%s\n' "${PAIRS[@]}" | jq -R 'split("=") | {(.[0]): .[1]}' | jq -s 'add // {}')

          SNAP=docs/migration/.openapi-snapshot.json
          BASE_SHA=$(jq -r '.chunk_sha256 // ""' "$SNAP" 2>/dev/null || echo "")
          BASE_KW=$(jq -c '.keywords_found // []' "$SNAP" 2>/dev/null || echo '[]')
          BASE_PR=$(jq -c '.openapi_base_probes // {}' "$SNAP" 2>/dev/null || echo '{}')

          REASONS=()
          CHANGED=false
          if [ -n "$SHA" ] && [ "$SHA" != "$BASE_SHA" ]; then
            REASONS+=("chunk content 변경")
            CHANGED=true
          fi
          NEW_KW=$(jq -n --argjson cur "$KW_JSON" --argjson base "$BASE_KW" '$cur - $base')
          if [ "$(printf '%s' "$NEW_KW" | jq 'length')" -gt 0 ]; then
            REASONS+=("🚨 새 키워드: $(printf '%s' "$NEW_KW" | jq -c .)")
            CHANGED=true
          fi
          PROBE_DIFF=$(jq -n --argjson cur "$PR_JSON" --argjson base "$BASE_PR" \
            '[($cur | to_entries[]) as $c | ($base[$c.key] // "?") as $b | select($c.value != $b) | "\($c.key) \($b)→\($c.value)"]')
          if [ "$(printf '%s' "$PROBE_DIFF" | jq 'length')" -gt 0 ]; then
            REASONS+=("🚨 endpoint: $(printf '%s' "$PROBE_DIFF" | jq -r 'join(", ")')")
            CHANGED=true
          fi

          if $CHANGED; then
            jq -n --arg url "$CHUNK" --arg sha "$SHA" --argjson size "$SIZE" \
              --argjson kw "$KW_JSON" --argjson pr "$PR_JSON" \
              --arg ts "$(date -u +%Y-%m-%d)" \
              '{chunk_url:$url,chunk_sha256:$sha,chunk_size:$size,keywords_found:$kw,openapi_base_probes:$pr,updated_at:$ts}' \
              > "$SNAP"
            printf '%s\n' "${REASONS[@]}" > /tmp/toss_reasons.txt
          else
            echo "⚪️ 변화 없음" > /tmp/toss_reasons.txt
          fi
          echo "$CHANGED" > /tmp/toss_changed

      - name: Compose message
        run: |
          NOW_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          API_CODE=$(cat /tmp/api_status)
          TOSS_CHANGED=$(cat /tmp/toss_changed)
          TOSS_REASONS=$(cat /tmp/toss_reasons.txt)
          PR_COUNT=$(jq 'length' /tmp/prs.json)

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [ "$PR_COUNT" = "0" ]; then
            PR_BLOCK="신규 PR 없음"
          else
            PR_BLOCK=$(jq -r --arg url "$REPO_URL" '.[] | "• [#\(.number)](\($url)/pull/\(.number)) \(.title) · **@\(.author.login)** · `+\(.additions)/-\(.deletions)`"' /tmp/prs.json)
          fi

          if [ "$API_CODE" = "200" ]; then
            API_LINE='`stock-infos/A005930` → **200 OK**'
          else
            API_LINE="🔴 status=\`$API_CODE\` — GitHub Actions IP 차단 vs 실제 회귀, 본인 머신 \`tossctl monitor api\` 로 확인"
          fi

          if [ "$TOSS_CHANGED" = "false" ]; then
            TOSS_BLOCK="⚪️ 변화 없음"
          else
            TOSS_BLOCK=$(printf '%s\n' "$TOSS_REASONS" | sed 's/^/• /')
          fi

          if [ "$PR_COUNT" = "0" ] && [ "$API_CODE" = "200" ] && [ "$TOSS_CHANGED" = "false" ]; then
            printf '## ✅ tossctl daily — `%s KST`\n신규 PR 없음 · 핵심 API OK · 토스 Open API ⚪️\n' "$NOW_KST" > /tmp/msg.txt
          else
            {
              printf '## 📊 tossctl daily — `%s KST`\n' "$NOW_KST"
              echo ""
              echo "### 🔀 PR (24h)"
              echo "$PR_BLOCK"
              echo ""
              echo "### ❤️ 핵심 API"
              echo "$API_LINE"
              echo ""
              echo "### 🔭 토스 Open API · [issue #31](${REPO_URL}/issues/31)"
              echo "$TOSS_BLOCK"
              echo ""
              echo "-# 인증 필요 endpoint 는 본인 머신 \`tossctl monitor api\` 로 확인"
            } > /tmp/msg.txt
          fi

          echo "--- payload ---"
          cat /tmp/msg.txt
          echo "--- end ---"

      - name: Send Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::DISCORD_WEBHOOK secret 미설정"
            exit 1
          fi
          # 1900자 잘라내기 (Discord 2000 한계)
          MSG=$(head -c 1900 /tmp/msg.txt)
          PAYLOAD=$(printf '%s' "$MSG" | jq -Rs '{content: .}')
          HTTP=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$WEBHOOK")
          echo "Discord status: $HTTP"
          cat /tmp/resp || true
          [ "$HTTP" = "204" ] || exit 1

      - name: Commit snapshot if changed
        if: hashFiles('docs/migration/.openapi-snapshot.json') != ''
        run: |
          if [ "$(cat /tmp/toss_changed 2>/dev/null)" != "true" ]; then
            echo "변화 없음 — commit skip"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/migration/.openapi-snapshot.json
          git diff --cached --quiet && { echo "이미 최신"; exit 0; }
          git commit -m "docs(migration): openapi-snapshot 자동 갱신"
          git push origin HEAD:main
