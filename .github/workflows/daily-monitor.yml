name: Daily Monitor

on:
  schedule:
    - cron: '0 10,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: PR list (24h)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,title,author,createdAt,updatedAt,additions,deletions \
            --jq "map(select(.createdAt >= \"$CUTOFF\" or .updatedAt >= \"$CUTOFF\"))" \
            > /tmp/prs.json
          cat /tmp/prs.json

      - name: 핵심 API probe
        id: api
        run: |
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -A 'Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
            'https://wts-info-api.tossinvest.com/api/v2/stock-infos/A005930' || echo ERR)
          echo "$CODE" > /tmp/api_status
          echo "code=$CODE"

      - name: 토스 Open API 페이지 모니터
        id: toss
        run: |
          # 공식 OpenAPI spec 직접 추적 (spec version + endpoint 목록 hash 가 강한 신호)
          SPEC_URL="https://openapi.tossinvest.com/openapi-docs/latest/openapi.json"
          SPEC=$(curl -sS --max-time 15 "$SPEC_URL" || true)
          if [ -n "$SPEC" ] && printf '%s' "$SPEC" | jq -e . >/dev/null 2>&1; then
            VERSION=$(printf '%s' "$SPEC" | jq -r '.info.version // ""')
            PATH_COUNT=$(printf '%s' "$SPEC" | jq '.paths | keys | length')
            PATHS_SHA=$(printf '%s' "$SPEC" | jq -S '.paths | keys' | shasum -a 256 | cut -d' ' -f1)
          else
            VERSION=""
            PATH_COUNT=0
            PATHS_SHA=""
          fi

          DOCS_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 https://developers.tossinvest.com/docs 2>/dev/null || echo ERR)
          LLMS_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 https://developers.tossinvest.com/llms.txt 2>/dev/null || echo ERR)

          SNAP=docs/migration/.openapi-snapshot.json
          BASE_VERSION=$(jq -r '.spec_version // ""' "$SNAP" 2>/dev/null || echo "")
          BASE_PATHS_SHA=$(jq -r '.spec_paths_sha256 // ""' "$SNAP" 2>/dev/null || echo "")
          BASE_PATH_COUNT=$(jq -r '.spec_path_count // 0' "$SNAP" 2>/dev/null || echo 0)
          BASE_LAST_CHECKED=$(jq -r '.last_checked_at // ""' "$SNAP" 2>/dev/null || echo "")
          TODAY=$(date -u +%Y-%m-%d)

          REASONS=()
          CHANGED=false

          if [ -n "$VERSION" ] && [ "$VERSION" != "$BASE_VERSION" ]; then
            REASONS+=("🚨 spec version: \`${BASE_VERSION}\` → \`${VERSION}\`")
            CHANGED=true
          fi
          if [ -n "$PATHS_SHA" ] && [ "$PATHS_SHA" != "$BASE_PATHS_SHA" ]; then
            REASONS+=("🚨 endpoint 목록 변경 (${BASE_PATH_COUNT} → ${PATH_COUNT}개)")
            CHANGED=true
          fi
          # spec fetch 실패는 일시 장애일 수 있어 변경으로 안 봄 (경고만)
          if [ -z "$VERSION" ]; then
            REASONS+=("⚠️ spec fetch 실패 (일시 장애 가능)")
          fi

          # snapshot 을 다시 커밋해야 하는지 플래그. 변경 시 전체 갱신,
          # 변화 없으면 heartbeat 로 last_checked_at 만 하루 1번 갱신.
          SNAP_DIRTY=false
          if $CHANGED && [ -n "$VERSION" ]; then
            jq -n --arg url "$SPEC_URL" --arg ver "$VERSION" --argjson pc "$PATH_COUNT" \
              --arg psha "$PATHS_SHA" --arg docs "$DOCS_CODE" --arg llms "$LLMS_CODE" \
              --arg ts "$TODAY" --arg lc "$TODAY" \
              '{phase:"spec-public",spec_url:$url,spec_version:$ver,spec_path_count:$pc,spec_paths_sha256:$psha,docs_url:"https://developers.tossinvest.com/docs",docs_status:$docs,llms_txt_status:$llms,updated_at:$ts,last_checked_at:$lc}' \
              > "$SNAP"
            printf '%s\n' "${REASONS[@]}" > /tmp/toss_reasons.txt
            SNAP_DIRTY=true
          else
            # 변화 없음(또는 일시 fetch 실패) — heartbeat: 날짜가 바뀐 첫 실행에만 last_checked_at 갱신
            if [ -n "$VERSION" ] && [ -f "$SNAP" ] && [ "$BASE_LAST_CHECKED" != "$TODAY" ]; then
              jq --arg t "$TODAY" '.last_checked_at=$t' "$SNAP" > "${SNAP}.tmp" && mv "${SNAP}.tmp" "$SNAP"
              SNAP_DIRTY=true
            fi
            if [ ${#REASONS[@]} -gt 0 ]; then
              printf '%s\n' "${REASONS[@]}" > /tmp/toss_reasons.txt
            else
              echo "⚪️ 변화 없음 (spec \`${VERSION}\`, ${PATH_COUNT} endpoints, 확인 ${TODAY})" > /tmp/toss_reasons.txt
            fi
          fi
          echo "$CHANGED" > /tmp/toss_changed
          echo "$SNAP_DIRTY" > /tmp/snap_dirty

      - name: Compose message
        run: |
          NOW_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          API_CODE=$(cat /tmp/api_status)
          TOSS_CHANGED=$(cat /tmp/toss_changed)
          TOSS_REASONS=$(cat /tmp/toss_reasons.txt)
          PR_COUNT=$(jq 'length' /tmp/prs.json)

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [ "$PR_COUNT" = "0" ]; then
            PR_BLOCK="신규 PR 없음"
          else
            PR_BLOCK=$(jq -r --arg url "$REPO_URL" '.[] | "• [#\(.number)](\($url)/pull/\(.number)) \(.title) · **@\(.author.login)** · `+\(.additions)/-\(.deletions)`"' /tmp/prs.json)
          fi

          if [ "$API_CODE" = "200" ]; then
            API_LINE='`stock-infos/A005930` → **200 OK**'
          else
            API_LINE="🔴 status=\`$API_CODE\` — GitHub Actions IP 차단 vs 실제 회귀, 본인 머신 \`tossctl monitor api\` 로 확인"
          fi

          if [ "$TOSS_CHANGED" = "false" ]; then
            TOSS_BLOCK="⚪️ 변화 없음"
          else
            TOSS_BLOCK=$(printf '%s\n' "$TOSS_REASONS" | sed 's/^/• /')
          fi

          if [ "$PR_COUNT" = "0" ] && [ "$API_CODE" = "200" ] && [ "$TOSS_CHANGED" = "false" ]; then
            printf '## ✅ tossctl daily — `%s KST`\n신규 PR 없음 · 핵심 API OK · 토스 Open API ⚪️\n' "$NOW_KST" > /tmp/msg.txt
          else
            {
              printf '## 📊 tossctl daily — `%s KST`\n' "$NOW_KST"
              echo ""
              echo "### 🔀 PR (24h)"
              echo "$PR_BLOCK"
              echo ""
              echo "### ❤️ 핵심 API"
              echo "$API_LINE"
              echo ""
              echo "### 🔭 토스 Open API · [issue #31](${REPO_URL}/issues/31)"
              echo "$TOSS_BLOCK"
              echo ""
              echo "-# 인증 필요 endpoint 는 본인 머신 \`tossctl monitor api\` 로 확인"
            } > /tmp/msg.txt
          fi

          echo "--- payload ---"
          cat /tmp/msg.txt
          echo "--- end ---"

      - name: Send Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::DISCORD_WEBHOOK secret 미설정"
            exit 1
          fi
          # 1900자 잘라내기 (Discord 2000 한계)
          MSG=$(head -c 1900 /tmp/msg.txt)
          PAYLOAD=$(printf '%s' "$MSG" | jq -Rs '{content: .}')
          HTTP=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$WEBHOOK")
          echo "Discord status: $HTTP"
          cat /tmp/resp || true
          [ "$HTTP" = "204" ] || exit 1

      - name: Commit snapshot (change or daily heartbeat)
        if: hashFiles('docs/migration/.openapi-snapshot.json') != ''
        run: |
          if [ "$(cat /tmp/snap_dirty 2>/dev/null)" != "true" ]; then
            echo "갱신할 내용 없음 — commit skip"
            exit 0
          fi
          # 변경이면 spec 갱신 메시지, 아니면 heartbeat (CI 미트리거)
          if [ "$(cat /tmp/toss_changed 2>/dev/null)" = "true" ]; then
            MSG="docs(migration): openapi-snapshot 자동 갱신"
          else
            MSG="chore(monitor): openapi-snapshot last_checked 갱신 [skip ci]"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/migration/.openapi-snapshot.json
          git diff --cached --quiet && { echo "이미 최신"; exit 0; }
          git commit -m "$MSG"
          git push origin HEAD:main
