name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run Go tests
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: Build CLI
        run: make build

      - name: Check auth helper syntax
        run: python -m compileall auth-helper

      - name: WTS 카탈로그 분류기 sanity
        run: python -m py_compile tools/wts_endpoints.py tools/update_new_markers.py
