name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset: tossctl-darwin-arm64
          - goos: darwin
            goarch: amd64
            asset: tossctl-darwin-amd64
          - goos: windows
            goarch: amd64
            asset: tossctl-windows-amd64
          - goos: linux
            goarch: amd64
            asset: tossctl-linux-amd64
          - goos: linux
            goarch: arm64
            asset: tossctl-linux-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.asset }}
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          BINARY="tossctl"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="tossctl.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-X github.com/${{ github.repository }}/internal/version.Version=${VERSION} -X github.com/${{ github.repository }}/internal/version.Commit=${COMMIT} -X github.com/${{ github.repository }}/internal/version.Date=${DATE}" \
            -o "dist/${{ matrix.asset }}/${BINARY}" \
            ./cmd/tossctl

      - name: Bundle auth helper
        run: cp -R auth-helper dist/${{ matrix.asset }}/auth-helper

      - name: Package artifact
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist/${{ matrix.asset }} && zip -r ../${{ matrix.asset }}.zip tossctl.exe auth-helper && cd ../..
            shasum -a 256 dist/${{ matrix.asset }}.zip > dist/${{ matrix.asset }}.zip.sha256
          else
            tar -C dist/${{ matrix.asset }} -czf dist/${{ matrix.asset }}.tar.gz tossctl auth-helper
            shasum -a 256 dist/${{ matrix.asset }}.tar.gz > dist/${{ matrix.asset }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}.tar.gz
            dist/${{ matrix.asset }}.tar.gz.sha256
            dist/${{ matrix.asset }}.zip
            dist/${{ matrix.asset }}.zip.sha256

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ASSETS=()
          for f in dist/tossctl-*.tar.gz dist/tossctl-*.tar.gz.sha256 dist/tossctl-*.zip dist/tossctl-*.zip.sha256; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md --repo "$GH_REPO"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes-file /tmp/release-notes.md --repo "$GH_REPO"
          fi

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Fetch Homebrew token
        id: doppler
        run: |
          set -euo pipefail
          TOKEN=$(doppler secrets get HOMEBREW_TAP_TOKEN --plain 2>/dev/null)
          if [ -z "$TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN not found in Doppler"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "HOMEBREW_TAP_TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA=$(awk '{print $1}' dist/tossctl-darwin-arm64.tar.gz.sha256)
          X86_SHA=$(awk '{print $1}' dist/tossctl-darwin-amd64.tar.gz.sha256)
          LINUX_ARM_SHA=$(awk '{print $1}' dist/tossctl-linux-arm64.tar.gz.sha256)
          LINUX_X86_SHA=$(awk '{print $1}' dist/tossctl-linux-amd64.tar.gz.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_arm_sha=$LINUX_ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_x86_sha=$LINUX_X86_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/homebrew-tossinvest-cli
          token: ${{ steps.doppler.outputs.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Checkout source for formula rendering
        uses: actions/checkout@v5
        with:
          path: src

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARM_SHA: ${{ steps.meta.outputs.arm_sha }}
          X86_SHA: ${{ steps.meta.outputs.x86_sha }}
          LINUX_ARM_SHA: ${{ steps.meta.outputs.linux_arm_sha }}
          LINUX_X86_SHA: ${{ steps.meta.outputs.linux_x86_sha }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x src/tools/render_homebrew_formula.sh
          src/tools/render_homebrew_formula.sh tap/Formula/tossctl.rb

      - name: Commit and push formula update
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tossctl.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "chore: update tossctl ${VERSION}"
          git push
