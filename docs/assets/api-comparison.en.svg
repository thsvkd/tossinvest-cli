<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="636" viewBox="0 0 1080 636" font-family="'Pretendard','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .title { font-size: 30px; font-weight: 800; fill: #191F28; }
      .subtitle { font-size: 16px; font-weight: 600; fill: #4E5968; }
      .legend { font-size: 12.5px; font-weight: 600; fill: #8B95A1; }
      .pill-strong { font-size: 15px; font-weight: 700; }
      .pill-muted { font-size: 14px; font-weight: 700; fill: #6B7684; }
      .note-muted { font-size: 11.5px; font-weight: 600; fill: #98A2B3; }
      .item-muted { font-size: 14px; fill: #8B95A1; }
      .item-strong { font-size: 16px; font-weight: 600; fill: #191F28; }
      .foot { font-size: 13px; fill: #8B95A1; }
      .check { font-size: 14px; fill: #B0B8C1; font-weight: 800; }
      .plus { font-size: 16px; fill: #3182F6; font-weight: 800; }
    </style>
  </defs>

  <rect width="1080" height="636" fill="#FFFFFF"/>

  <text x="32" y="42" class="title">Read &amp; trade coverage</text>
  <text x="32" y="66" class="subtitle">tossctl = <tspan font-weight="800" fill="#191F28">everything</tspan> the official Open API will offer ＋ more — a superset</text>

  <rect x="24" y="86" width="1032" height="486" rx="16" fill="#EAF2FF" stroke="#3182F6" stroke-width="2.5"/>
  <rect x="44" y="100" width="300" height="32" rx="16" fill="#3182F6"/>
  <text x="58" y="122" class="pill-strong" fill="#FFFFFF">✓ tossctl — supports all of the below</text>

  <!-- Official API: small, muted (limited surface) -->
  <rect x="52" y="152" width="340" height="402" rx="12" fill="#F2F4F6" stroke="#C4CBD4" stroke-width="1.5" stroke-dasharray="6 5"/>
  <rect x="70" y="166" width="168" height="28" rx="14" fill="#E1E4E8"/>
  <text x="154" y="185" text-anchor="middle" class="pill-muted">Official Open API</text>
  <text x="70" y="214" class="note-muted">Staged rollout to pre-applicants · REST only</text>

  <text x="76" y="252" class="check">✓</text><text x="94" y="252" class="item-muted">Accounts &amp; summary</text>
  <text x="76" y="286" class="check">✓</text><text x="94" y="286" class="item-muted">Portfolio</text>
  <text x="76" y="320" class="check">✓</text><text x="94" y="320" class="item-muted">Quotes &amp; trade ticks</text>
  <text x="76" y="354" class="check">✓</text><text x="94" y="354" class="item-muted">Price limits &amp; warnings</text>
  <text x="76" y="388" class="check">✓</text><text x="94" y="388" class="item-muted">Trading hours &amp; FX</text>
  <text x="76" y="422" class="check">✓</text><text x="94" y="422" class="item-muted">Order lookup</text>
  <text x="76" y="456" class="check">✓</text><text x="94" y="456" class="item-muted">Limit buy / sell</text>
  <text x="76" y="490" class="check">✓</text><text x="94" y="490" class="item-muted">Cancel / amend</text>
  <text x="70" y="532" class="legend">↑ expected at launch — tossctl already supports it all</text>

  <!-- tossctl-only: large, vivid (dominant) -->
  <rect x="412" y="152" width="628" height="402" rx="12" fill="#D6E6FF" stroke="#3182F6" stroke-width="2"/>
  <rect x="432" y="166" width="320" height="30" rx="15" fill="#3182F6"/>
  <text x="592" y="187" text-anchor="middle" class="pill-strong" fill="#FFFFFF">＋ tossctl-only — not in official API</text>

  <text x="442" y="233" class="plus">＋</text><text x="464" y="233" class="item-strong">Investor flows (retail / foreign / institutional)</text>
  <text x="442" y="263" class="plus">＋</text><text x="464" y="263" class="item-strong">Market indices (KOSPI, Nasdaq, VIX, …)</text>
  <text x="442" y="293" class="plus">＋</text><text x="464" y="293" class="item-strong">Toss AI signals</text>
  <text x="442" y="323" class="plus">＋</text><text x="464" y="323" class="item-strong">Stock screener (preset &amp; custom)</text>
  <text x="442" y="353" class="plus">＋</text><text x="464" y="353" class="item-strong">Watchlist management (folder CRUD)</text>
  <text x="442" y="383" class="plus">＋</text><text x="464" y="383" class="item-strong">Transaction ledger &amp; cash overview</text>
  <text x="442" y="413" class="plus">＋</text><text x="464" y="413" class="item-strong">Multi-quote &amp; live refresh</text>
  <text x="442" y="443" class="plus">＋</text><text x="464" y="443" class="item-strong">Real-time push (SSE stream)</text>
  <text x="442" y="473" class="plus">＋</text><text x="464" y="473" class="item-strong">Fractional orders (amount-based)</text>
  <text x="442" y="503" class="plus">＋</text><text x="464" y="503" class="item-strong">Dry-run preview &amp; safety gates</text>
  <text x="442" y="533" class="plus">＋</text><text x="464" y="533" class="item-strong">CSV export</text>

  <text x="32" y="600" class="foot">The official Open API is rolling out in stages to pre-applicants — its scope may change across rollout phases.</text>
  <text x="32" y="620" class="foot">Today, tossctl is the only way to use every feature in both columns.</text>
</svg>
