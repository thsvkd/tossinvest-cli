<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" font-family="'Pretendard','Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .title { font-size: 30px; font-weight: 800; fill: #191F28; }
      .subtitle { font-size: 16px; font-weight: 600; fill: #4E5968; }
      .legend { font-size: 12.5px; font-weight: 600; fill: #8B95A1; }
      .legend-hl { font-size: 13.5px; font-weight: 800; fill: #3182F6; }
      .pill-strong { font-size: 15px; font-weight: 700; }
      .pill-muted { font-size: 14px; font-weight: 700; fill: #6B7684; }
      .note-muted { font-size: 11.5px; font-weight: 600; fill: #98A2B3; }
      .item-muted { font-size: 13.5px; fill: #8B95A1; }
      .item-strong { font-size: 16px; font-weight: 600; fill: #191F28; }
      .foot { font-size: 13px; fill: #8B95A1; }
      .check { font-size: 13.5px; fill: #15803D; font-weight: 800; }
      .plus { font-size: 16px; fill: #3182F6; font-weight: 800; }
    </style>
  </defs>

  <rect width="1080" height="660" fill="#FFFFFF"/>

  <text x="32" y="42" class="title">Read &amp; trade coverage</text>
  <text x="32" y="66" class="subtitle">tossctl = <tspan font-weight="800" fill="#191F28">100% of the official Open API</tspan> ＋ 12 features it doesn't have</text>

  <rect x="24" y="86" width="1032" height="512" rx="16" fill="#EAF2FF" stroke="#3182F6" stroke-width="2.5"/>
  <rect x="44" y="100" width="318" height="32" rx="16" fill="#3182F6"/>
  <text x="58" y="122" class="pill-strong" fill="#FFFFFF">✓ tossctl — all of official + more</text>

  <rect x="52" y="152" width="360" height="428" rx="12" fill="#F2F4F6" stroke="#C4CBD4" stroke-width="1.5" stroke-dasharray="6 5"/>
  <rect x="70" y="166" width="190" height="28" rx="14" fill="#E1E4E8"/>
  <text x="165" y="185" text-anchor="middle" class="pill-muted">Official API — full surface</text>
  <text x="70" y="212" class="note-muted">REST only · staged rollout to pre-applicants</text>

  <text x="76" y="246" class="check">✓</text><text x="96" y="246" class="item-muted">Accounts &amp; summary</text>
  <text x="76" y="276" class="check">✓</text><text x="96" y="276" class="item-muted">Portfolio &amp; holdings</text>
  <text x="76" y="306" class="check">✓</text><text x="96" y="306" class="item-muted">Quotes &amp; trade ticks</text>
  <text x="76" y="336" class="check">✓</text><text x="96" y="336" class="item-muted">Orderbook (10-level bid/ask)</text>
  <text x="76" y="366" class="check">✓</text><text x="96" y="366" class="item-muted">Candle charts</text>
  <text x="76" y="396" class="check">✓</text><text x="96" y="396" class="item-muted">Price limits &amp; warnings</text>
  <text x="76" y="426" class="check">✓</text><text x="96" y="426" class="item-muted">Trading hours &amp; FX</text>
  <text x="76" y="456" class="check">✓</text><text x="96" y="456" class="item-muted">Sellable qty &amp; commission</text>
  <text x="76" y="486" class="check">✓</text><text x="96" y="486" class="item-muted">Order lookup &amp; place</text>
  <text x="76" y="516" class="check">✓</text><text x="96" y="516" class="item-muted">Cancel &amp; amend</text>
  <text x="70" y="548" class="legend">Per public docs (developers.tossinvest.com)</text>
  <text x="70" y="568" class="legend-hl">→ tossctl covers 100% ✓</text>

  <rect x="432" y="152" width="624" height="428" rx="12" fill="#D6E6FF" stroke="#3182F6" stroke-width="2"/>
  <rect x="452" y="166" width="340" height="30" rx="15" fill="#3182F6"/>
  <text x="622" y="187" text-anchor="middle" class="pill-strong" fill="#FFFFFF">＋ tossctl-only — not in official API</text>

  <text x="462" y="234" class="plus">＋</text><text x="484" y="234" class="item-strong">Investor flows (retail / foreign / institutional)</text>
  <text x="462" y="265" class="plus">＋</text><text x="484" y="265" class="item-strong">Market indices (KOSPI, Nasdaq, VIX, …)</text>
  <text x="462" y="296" class="plus">＋</text><text x="484" y="296" class="item-strong">Toss AI signals</text>
  <text x="462" y="327" class="plus">＋</text><text x="484" y="327" class="item-strong">Stock screener (preset &amp; custom)</text>
  <text x="462" y="358" class="plus">＋</text><text x="484" y="358" class="item-strong">Live popularity ranking</text>
  <text x="462" y="389" class="plus">＋</text><text x="484" y="389" class="item-strong">Watchlist management (folder CRUD)</text>
  <text x="462" y="420" class="plus">＋</text><text x="484" y="420" class="item-strong">Transaction ledger &amp; cash overview</text>
  <text x="462" y="451" class="plus">＋</text><text x="484" y="451" class="item-strong">Multi-quote &amp; live refresh</text>
  <text x="462" y="482" class="plus">＋</text><text x="484" y="482" class="item-strong">Real-time push (SSE stream)</text>
  <text x="462" y="513" class="plus">＋</text><text x="484" y="513" class="item-strong">Fractional orders (amount-based)</text>
  <text x="462" y="544" class="plus">＋</text><text x="484" y="544" class="item-strong">Dry-run preview · safety gates · CSV</text>

  <text x="32" y="626" class="foot">The official Open API is rolling out in stages to pre-applicants (REST only) and its surface may change. tossctl covers 100% of it and adds 12+ more.</text>
</svg>
